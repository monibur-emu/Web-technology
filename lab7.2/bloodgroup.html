<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blood Group Validation</title>
    <script>
        function validateBloodGroup() {
            let bloodGroup = document.getElementById("bloodGroupInput").value;
            if (bloodGroup === "") {
                alert("Select a Blood group");
                return false;
            }
            return true;
        }
    </script>
</head>

<body>
    <form onsubmit="return validateBloodGroup()">
        Blood Group
        <select id="bloodGroupInput">
            <option value="">Select</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select>
        <hr style="width:25%;margin-left: 0px; border:1px solid black;">
        <button type="submit">Submit</button>

    </form>
</body>

</html>
