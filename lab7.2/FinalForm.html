<!DOCTYPE html>
<html>

<head>
    <title>Person Profile</title>

    <style>
        body {
            font-family: Arial;
        }

        .container {
            width: 600px;
            margin: auto;
            border: 2px solid black;
            padding: 10px;
        }


        .title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            border-bottom: 2px solid black;
            padding: 10px;
        }


        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 10px;
        }

        .label {
            width: 150px;
        }

        .buttons {
            text-align: right;
            padding: 15px;
        }
    </style>

    <script>
        function validateForm() {


            let name = document.getElementById("name").value.trim();

            if (name === "") {
                alert("Name cannot be empty");
                return false;
            }

            let words = name.split(" ");
            if (words.length < 2) {
                alert("Name must contain at least two words");
                return false;
            }

            let first = name.charAt(0);
            if (!((first >= 'A' && first <= 'Z') || (first >= 'a' && first <= 'z'))) {
                alert("Name must start with letter");
                return false;
            }

            for (let i = 0; i < name.length; i++) {
                let ch = name.charAt(i);
                if (!((ch >= 'A' && ch <= 'Z') || (ch >= 'a' && ch <= 'z') || ch === '.' || ch === '-' || ch === ' ')) {
                    alert("Invalid character in name");
                    return false;
                }
            }


            let email = document.getElementById("email").value.trim();
            if (email === "") {
                alert("Email required");
                return false;
            }

            let at = email.indexOf("@");
            let dot = email.lastIndexOf(".");
            if (at < 1 || dot < at + 2 || dot === email.length - 1) {
                alert("Invalid Email");
                return false;
            }


            let gender = document.getElementsByName("gender");
            let g = false;
            for (let i = 0; i < gender.length; i++) {
                if (gender[i].checked) { g = true; }
            }
            if (!g) {
                alert("Select gender");
                return false;
            }


            let dd = document.getElementById("dd").value;
            let mm = document.getElementById("mm").value;
            let yyyy = document.getElementById("yyyy").value;

            if (dd === "" || mm === "" || yyyy === "") {
                alert("Date of birth required");
                return false;
            }

            if (dd < 1 || dd > 31 || mm < 1 || mm > 12 || yyyy < 1900 || yyyy > 2016) {
                alert("Invalid date");
                return false;
            }

            if (document.getElementById("blood").value === "") {
                alert("Select blood group");
                return false;
            }

            let degree = document.getElementsByName("degree");
            let d = false;
            for (let i = 0; i < degree.length; i++) {
                if (degree[i].checked) { d = true; }
            }
            if (!d) {
                alert("Select degree");
                return false;
            }


            if (document.getElementById("photo").value === "") {
                alert("Upload photo");
                return false;
            }

            return true;
        }
    </script>
</head>

<body>

    <div class="container">

        <div class="title">PERSON PROFILE</div>

        <form onsubmit="return validateForm()">

            <table>

                <tr>
                    <td class="label">Name</td>
                    <td><input type="text" id="name"></td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td><input type="text" id="email"></td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td>
                        <input type="radio" name="gender">Male
                        <input type="radio" name="gender">Female
                        <input type="radio" name="gender">Other
                    </td>
                </tr>

                <tr>
                    <td>Date of Birth</td>
                    <td>
                        <input type="number" id="dd" style="width:50px"> /
                        <input type="number" id="mm" style="width:50px"> /
                        <input type="number" id="yyyy" style="width:80px">
                        (dd/mm/yyyy)
                    </td>
                </tr>

                <tr>
                    <td>Blood Group</td>
                    <td>
                        <select id="blood">
                            <option value="">Select</option>
                            <option>A+</option>
                            <option>B+</option>
                            <option>O+</option>
                            <option>AB+</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Degree</td>
                    <td>
                        <input type="checkbox" name="degree">SSC
                        <input type="checkbox" name="degree">HSC
                        <input type="checkbox" name="degree">BSc.
                        <input type="checkbox" name="degree">MSc.
                    </td>
                </tr>

                <tr>
                    <td>Photo</td>
                    <td><input type="file" id="photo"></td>
                </tr>

                <tr>
                    <td colspan="2" class="buttons">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>

            </table>

        </form>
    </div>

</body>

</html>
